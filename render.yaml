# Render Blueprint — defines all services for one-click deploy
# Docs: https://docs.render.com/blueprint-spec

services:
  # ── Cron Job: runs the full pipeline daily ─────────────────
  - type: cron
    name: ai-news-digest
    runtime: docker
    dockerfilePath: ./Dockerfile
    schedule: "0 8 * * *" # Every day at 8:00 AM UTC
    region: frankfurt
    plan: starter
    branch: main
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: LLM_PROVIDER
        value: groq
      - key: DATABASE_URL
        fromDatabase:
          name: news-aggregator-db
          property: connectionString
      - key: GROQ_API_KEY
        sync: false # manually set in Render dashboard
      - key: OPENAI_API_KEY
        sync: false
      - key: SMTP_EMAIL
        sync: false
      - key: SMTP_APP_PASSWORD
        sync: false
      - key: RECIPIENT_EMAIL
        sync: false
      - key: BASE_URL
        value: https://lumin-ai-news.onrender.com

  # ── Web Service: FastAPI subscription page ────────────────
  - type: web
    name: lumin-ai-news
    runtime: docker
    dockerfilePath: ./Dockerfile.web
    plan: free
    region: frankfurt
    branch: main
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: news-aggregator-db
          property: connectionString
      - key: BASE_URL
        value: https://lumin-ai-news.onrender.com

# ── Managed PostgreSQL ─────────────────────────────────────
databases:
  - name: news-aggregator-db
    plan: free
    databaseName: news_aggregator
    user: aggregator
    region: frankfurt
