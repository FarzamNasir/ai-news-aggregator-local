# Render Blueprint — defines all services for one-click deploy
# Docs: https://docs.render.com/blueprint-spec

services:
  # ── Cron Job: runs the full pipeline daily ─────────────────
  - type: cron
    name: ai-news-digest
    runtime: docker
    schedule: "0 8 * * *" # Every day at 8:00 AM UTC
    region: frankfurt
    plan: starter
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: news-aggregator-db
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false # manually set in Render dashboard
      - key: SMTP_EMAIL
        sync: false
      - key: SMTP_APP_PASSWORD
        sync: false
      - key: RECIPIENT_EMAIL
        sync: false

# ── Managed PostgreSQL ─────────────────────────────────────
databases:
  - name: news-aggregator-db
    plan: free
    databaseName: news_aggregator
    user: aggregator
    region: frankfurt
